name: WorkSphere Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Spring Boot Microservices
        run: |
          cd apps/enterprise-monitoring-system/backend
          ./mvnw clean install -DskipTests

      - name: Build React Frontend
        run: |
          cd apps/enterprise-monitoring-system/frontend
          npm install
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Kubernetes EKS Cluster
        run: |
          aws eks update-kubeconfig --name worksphere-eks-cluster --region us-east-1
          kubectl apply -f apps/enterprise-monitoring-system/deployment/kubernetes/namespace.yaml
          kubectl apply -f apps/enterprise-monitoring-system/deployment/kubernetes/
