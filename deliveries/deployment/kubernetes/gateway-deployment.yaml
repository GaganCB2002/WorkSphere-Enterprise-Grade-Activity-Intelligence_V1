apiVersion: apps/v1
kind: Deployment
metadata:
  name: worksphere-gateway
  namespace: worksphere-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worksphere-gateway
  template:
    metadata:
      labels:
        app: worksphere-gateway
    spec:
      containers:
        - name: gateway
          image: worksphere-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          resources:
            limits:
              memory: "1Gi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: worksphere-gateway
  namespace: worksphere-prod
spec:
  ports:
    - port: 8080
  selector:
    app: worksphere-gateway
