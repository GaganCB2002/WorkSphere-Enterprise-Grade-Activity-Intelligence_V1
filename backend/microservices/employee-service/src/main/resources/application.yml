server:
  port: 8082
  servlet:
    context-path: /api/v1/employee

spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5432/worksphere_employee
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
