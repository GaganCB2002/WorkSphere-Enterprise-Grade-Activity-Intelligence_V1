server:
  port: 8087
  servlet:
    context-path: /api/v1/monitoring

spring:
  application:
    name: monitoring-service
  datasource:
    url: jdbc:postgresql://localhost:5432/worksphere_monitoring
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
