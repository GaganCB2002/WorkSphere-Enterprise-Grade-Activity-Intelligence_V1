version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: worksphere-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: worksphere_enterprise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - worksphere-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: worksphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - worksphere-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: worksphere-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - worksphere-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: worksphere-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - worksphere-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: worksphere-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - worksphere-network

  grafana:
    image: grafana/grafana:10.0.3
    container_name: worksphere-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - worksphere-network

  gateway-service:
    build:
      context: ../microservices/gateway-service
      dockerfile: Dockerfile
    container_name: worksphere-gateway
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - worksphere-network

  auth-service:
    build:
      context: ../microservices/auth-service
      dockerfile: Dockerfile
    container_name: worksphere-auth
    depends_on:
      - postgres
      - redis
    networks:
      - worksphere-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: worksphere-frontend
    mem_limit: 1g
    ports:
      - "80:80"
    depends_on:
      - gateway-service
    networks:
      - worksphere-network

networks:
  worksphere-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
