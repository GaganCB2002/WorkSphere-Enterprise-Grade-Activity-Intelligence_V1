apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liveguard-ingress
  namespace: liveguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: liveguard.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: liveguard-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: liveguard-api
            port:
              number: 8080
