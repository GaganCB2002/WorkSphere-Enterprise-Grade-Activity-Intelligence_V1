version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: liveguard-postgres
    environment:
      POSTGRES_DB: liveguard
      POSTGRES_USER: liveguard
      POSTGRES_PASSWORD: liveguard123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - liveguard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liveguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liveguard-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - liveguard-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: liveguard-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - liveguard-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: liveguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - liveguard-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: liveguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - liveguard-network

  api:
    build:
      context: ./backend-springboot
      dockerfile: Dockerfile
    container_name: liveguard-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: liveguard
      DB_PASS: liveguard123
      REDIS_HOST: redis
      KAFKA_HOST: kafka
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    ports:
      - "8080:8080"
    networks:
      - liveguard-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: liveguard-ai
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: liveguard
      DB_USER: liveguard
      DB_PASS: liveguard123
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    networks:
      - liveguard-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: liveguard-frontend
    depends_on:
      - api
    ports:
      - "3000:80"
    networks:
      - liveguard-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: liveguard-nginx
    depends_on:
      - api
      - frontend
      - ai-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - liveguard-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: liveguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - liveguard-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  liveguard-network:
    driver: bridge
