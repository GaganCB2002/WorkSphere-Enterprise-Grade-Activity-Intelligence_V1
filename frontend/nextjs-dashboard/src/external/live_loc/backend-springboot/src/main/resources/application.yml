server:
  port: 8080

spring:
  application:
    name: liveguard-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/liveguard
    username: ${DB_USER:liveguard}
    password: ${DB_PASS:liveguard123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
  expiration: 86400000
  refresh-expiration: 604800000

aws:
  s3:
    bucket: ${S3_BUCKET:liveguard-files}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  file-upload-max-size: 50MB
  gps-batch-size: 100
  websocket-allowed-origins: "*"
